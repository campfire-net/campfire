name: Deploy Azure Functions

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Run tests
        run: go test ./...

      - name: Vet
        run: go vet ./...

      - name: Build cf-functions (linux/amd64)
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: '0'
        run: go build -o cf-functions ./cmd/cf-functions/

      - name: Build cf-mcp (linux/amd64)
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: '0'
        run: go build -o cf-mcp ./cmd/cf-mcp/

      - name: Package deployment zip
        run: |
          mkdir -p deploy
          cp cf-functions deploy/
          cp cf-mcp deploy/
          cp host.json deploy/
          cd deploy && zip -r ../functions.zip .

      - name: Deploy to Azure Functions
        uses: azure/functions-action@v1
        with:
          app-name: ${{ vars.AZURE_FUNCTIONAPP_NAME }}
          package: functions.zip
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
