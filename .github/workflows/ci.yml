name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      azurite:
        image: mcr.microsoft.com/azure-storage/azurite
        ports:
          - 10002:10002
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Run tests
        run: go test ./...

      - name: Run cf-mcp tests with race detector
        run: go test -race ./cmd/cf-mcp/...
        env:
          CGO_ENABLED: 1

      - name: Run Azurite integration tests
        run: go test -tags azurite -v ./pkg/store/aztable/...

      - name: Build check
        run: go build ./cmd/cf ./cmd/cf-mcp ./cmd/cf-functions

      - name: Vet
        run: go vet ./...
