app = "cf-mcp"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile.hosted"

[env]
  CF_HOME = "/data"
  CF_EXTERNAL_URL = "https://cf-mcp.fly.dev"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "5s"
    interval = "15s"
    method = "GET"
    path = "/health"
    timeout = "2s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"

[[mounts]]
  source = "cf_mcp_data"
  destination = "/data"
  initial_size = "1gb"
