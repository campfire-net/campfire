{{template "base" .}}
{{define "title"}}Sign in — Campfire{{end}}
{{define "content"}}
<h1>Sign in</h1>
<p>Enter your email address and we'll send you a sign-in link.</p>
<form method="post" action="/auth/magic">
    <input type="hidden" name="_csrf" value="{{.CSRFToken}}">
    <label for="email">Email address</label>
    <input type="email" id="email" name="email" required autofocus placeholder="you@example.com">
    <button type="submit">Send sign-in link</button>
</form>
<p><a href="/auth/github">Sign in with GitHub instead</a></p>
{{end}}
