<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Campfire Logo Candidates</title>
<style>
body { background: #1a1a2e; color: #e0e0e0; font-family: system-ui, sans-serif; margin: 0; padding: 2rem; }
h1 { text-align: center; margin-bottom: 2rem; }
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; max-width: 900px; margin: 0 auto; }
.card { background: #16213e; border-radius: 12px; padding: 1.5rem; text-align: center; }
.card img { width: 100%; max-width: 400px; border-radius: 8px; }
.card h2 { margin: 1rem 0 0.5rem; }
.card p { color: #999; font-size: 0.9rem; }
</style>
</head>
<body>
<h1>Campfire Logo Candidates</h1>
<div class="grid">
  <div class="card">
    <img src="logo-candidate-1.png" alt="Candidate 1">
    <h2>#1 — Classic Campfire</h2>
    <p>Logs + flames, flat geometric style</p>
  </div>
  <div class="card">
    <img src="logo-candidate-2.png" alt="Candidate 2">
    <h2>#2 — Abstract Flame</h2>
    <p>Three flowing shapes on navy, modern tech feel</p>
  </div>
  <div class="card">
    <img src="logo-candidate-3.png" alt="Candidate 3">
    <h2>#3 — Line Art</h2>
    <p>Single-color amber outline, scales well to favicon</p>
  </div>
  <div class="card">
    <img src="logo-candidate-4.png" alt="Candidate 4">
    <h2>#4 — Layered Flame</h2>
    <p>Overlapping petals, bold and graphic</p>
  </div>
</div>
</body>
</html>
